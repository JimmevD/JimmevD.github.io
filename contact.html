<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - Jimme van Duijnhoven</title>
    <link rel="stylesheet" href="/Css/styleBase.css">
    <link rel="stylesheet" href="/Css/styleContact.css">
    <script src="JS/jquery-4.0.0.min.js"></script>
    <script src="JS/shared-layout.js"></script>
    <script src="JS/html-extension-remover.js"></script>
    <script src="JS/email-links.js"></script>
    <script src="JS/contact-form.js"></script>


</head>
<body>
    <div data-include="header" data-active-page="contact"></div>

    <div class="contact-section-wrapper">
        <div class="contact-section">
            <div class="contact-container">
                <h2>Get in Touch</h2>
                <p>If you have any questions, suggestions, or just want to say hello, feel free to reach out to me.</p>
                <div class="contact-info">
                <p class="contact-item"><img src="Content/Icons/Contact/Emailicon.webp" alt="Email Icon" loading="lazy" decoding="async">  <span id="email"></span></p>
                <p class="contact-item"><img src="Content/Icons/Contact/LinkedInIcon.webp" alt="LinkedIn Icon" loading="lazy" decoding="async"> <a href="https://www.linkedin.com/in/jimme-van-duijnhoven-63b93b21b/" target="_blank">My profile</a></p>
                <p class="contact-item"><img src="Content/Icons/Contact/GithhubIcon.svg" alt="GitHub Icon" loading="lazy" decoding="async"> <a href="https://github.com/JimmevD" target="_blank">My profile</a></p>
                </div>
            </div>
            
            <div class="contact-form">
                <h2>Send a Message</h2>
                <form id="contact-form" action="https://api.web3forms.com/submit" method="POST">
                    <!-- Web3Forms Access Key -->
                    <input type="hidden" name="access_key" value="52ca11e0-51ed-40d3-b5d5-8e3eb00ceaa7">
            
                    <!-- User Inputs -->
                    <input type="text" name="name" placeholder="Your Name" required>
                    <input type="email" name="email" placeholder="Your Email" required>
                    <textarea name="message" placeholder="Your Message" required></textarea>
            
                    <!-- Honeypot Spam Protection -->
                    <input type="checkbox" name="botcheck" class="hidden" style="display: none;">
            
                    <button type="submit">Send</button>
                </form>
            </div>
            

        </div>
    </div>
    
    <div data-include="footer"></div>
</body>
</html>
